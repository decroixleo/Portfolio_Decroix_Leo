<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // Redirige vers index.html avec le path en hash
    var path = location.pathname.replace(/^\/[^\/]+/, '') || '/';
    var page = path.replace('/', '').replace('/', '');
    if (page === 'projets' || page === 'veille') {
      location.replace(location.origin + '/#' + page);
    } else {
      location.replace(location.origin + '/');
    }
  </script>
</head>
<body></body>
</html>
